# Update prefix key
unbind C-s
set -g prefix C-s

# Propagate DISPLAY
# set-option -g update-environment "DISPLAY XAUTHORITY"

# Easily reload configuration
bind r source-file ~/.config/tmux/tmux.conf

# Set vi mode
set-window-option -g mode-keys vi

# Enable 'v' to start selection on copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection

set -g mouse on
# Setting used on tars to fix nvim's color theme mismatch
# set -g default-terminal "tmux-256color"
# set -as terminal-features ",tmux-256color:RGB,xterm-256color:RGB,screen-256color:RGB"

set-option -g status-position top
# set-option -g set-titles on
# set-option -g set-titles-string "#W"

# Split panes keybindings
bind - split-window -v
bind | split-window -h

# Slow down copy-mode scroll speed (for high-res touchpad in Kitty).
# Only applies once already in copy-mode; does not affect mouse passthrough to apps.
# bind -T copy-mode-vi WheelUpPane   send-keys -X -N 1 scroll-up
# bind -T copy-mode-vi WheelDownPane send-keys -X -N 1 scroll-down
# bind -T copy-mode    WheelUpPane   send-keys -X -N 1 scroll-up
# bind -T copy-mode    WheelDownPane send-keys -X -N 1 scroll-down

# Window switching
bind -n M-h previous-window
bind -n M-l next-window

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @override_copy_command 'xclip -in -selection clipboard'
set -g @plugin 'sainnhe/tmux-fzf' # Keybinding: prefix-F (shift f)

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
